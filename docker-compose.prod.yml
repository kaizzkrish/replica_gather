version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: replica_gather
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    restart: always
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/replica_gather
      - PORT=707
      - CORS_ORIGINS=https://ourlittlespace.in,https://www.ourlittlespace.in
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=https://ourlittlespace.in
    restart: always
    depends_on:
      - server

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "8080:80" # Map host 8080 to container 80
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server

volumes:
  postgres_data:
