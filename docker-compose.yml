services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: replica_gather
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    restart: always
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/replica_gather
      - PORT=3001
      - CORS_ORIGINS=http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
