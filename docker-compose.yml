services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: replica_gather
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@db:5432/replica_gather}
      - PORT=707
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    ports:
      - "707:707"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:707}
    restart: always
    ports:
      - "2707:80"
    depends_on:
      - server

volumes:
  postgres_data:
